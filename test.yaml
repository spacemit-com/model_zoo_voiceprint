module: components/model_zoo/voiceprint

tests:
  - name: voiceprint-fake-backend-contract
    description: Verifies voiceprint presets, backend registry, embedding registration, identify, verify, and persistence with a fake backend.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash components/model_zoo/voiceprint/tests/test_fake_backend_contract.sh

  - name: voiceprint-invalid-input-error-path
    description: Verifies unknown presets, unavailable backend, bad embedding dimension, and bad audio fail explicitly.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash components/model_zoo/voiceprint/tests/test_invalid_input_error_path.sh
